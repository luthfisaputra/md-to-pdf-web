<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MD to PDF</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #E8E8E4;
            --sidebar:  #DDDDD8;
            --surface:  #F8F8F5;
            --border:   #C8C8C2;
            --accent:   #2A2A2A;
            --muted:    #7A7A74;
            --danger:   #C0392B;
            --ink:      #1A1A18;
            --tag-bg:   #2A2A2A;
            --tag-text: #F0F0EC;
            --radius:   10px;
            --mono:     'DM Mono', monospace;
            --body:     'DM Sans', sans-serif;
            --display:  'Fraunces', serif;
        }

        body {
            font-family: var(--body);
            background: var(--bg);
            color: var(--ink);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── TOPBAR ── */
        .topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 28px; height: 56px; background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 10; }
        .topbar-brand { font-family: var(--display); font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; color: var(--ink); }
        .topbar-brand span { font-style: italic; color: var(--muted); }
        .topbar-actions { display: flex; gap: 10px; align-items: center; }

        .btn { font-family: var(--body); font-size: 0.8rem; font-weight: 500; cursor: pointer; border: none; border-radius: 20px; padding: 7px 18px; transition: all 0.18s ease; display: inline-flex; align-items: center; gap: 6px; }
        .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--ink); }
        .btn-outline:hover { background: var(--surface); border-color: var(--accent); }
        .btn-solid { background: var(--ink); color: #F0F0EC; }
        .btn-solid:hover { background: #3a3a38; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { background: #a93226; }
        .btn-sm { padding: 5px 12px; font-size: 0.75rem; }

        /* ── LAYOUT ── */
        .layout { display: flex; flex: 1; overflow: hidden; }

        /* ── SIDEBAR ── */
        .sidebar { width: 210px; flex-shrink: 0; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 16px 12px; gap: 6px; overflow-y: auto; }
        .sidebar-header { display: flex; align-items: center; justify-content: space-between; padding: 0 4px 10px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
        .sidebar-title { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
        .btn-add { width: 24px; height: 24px; border-radius: 6px; background: var(--ink); color: #fff; font-size: 1rem; line-height: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; transition: background 0.15s; }
        .btn-add:hover { background: #3a3a38; }

        .file-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: var(--radius); cursor: pointer; transition: background 0.15s; position: relative; }
        .file-item:hover { background: rgba(0,0,0,0.06); }
        .file-item.active { background: var(--surface); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .file-icon { font-size: 0.9rem; color: var(--muted); flex-shrink: 0; }
        .file-name { flex: 1; font-size: 0.85rem; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--ink); }
        .file-actions { display: none; gap: 4px; }
        .file-item:hover .file-actions, .file-item.active .file-actions { display: flex; }

        .icon-btn { background: none; border: none; cursor: pointer; padding: 3px; border-radius: 4px; color: var(--muted); font-size: 0.8rem; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
        .icon-btn:hover { background: rgba(0,0,0,0.08); color: var(--ink); }
        .icon-btn.del:hover { background: #fce4e4; color: var(--danger); }

        /* ── MAIN ── */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--surface); }
        .main-info { padding: 10px 24px; font-size: 0.8rem; color: var(--muted); border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; gap: 8px; }

        .editor-area { display: flex; flex: 1; overflow: hidden; }
        .pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .pane + .pane { border-left: 1px solid var(--border); }
        .pane-header { padding: 10px 20px; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }

        #markdown-input { flex: 1; resize: none; border: none; outline: none; padding: 24px; font-family: var(--mono); font-size: 0.85rem; line-height: 1.7; color: var(--ink); background: #FAFAF7; tab-size: 2; }
        #preview-pane { flex: 1; overflow-y: auto; padding: 24px 32px; background: var(--surface); }

        /* MARKDOWN PREVIEW STYLES */
        #preview-pane h1, #preview-pane h2, #preview-pane h3, #preview-pane h4 { font-family: var(--display); font-weight: 700; color: var(--ink); margin: 1.4em 0 0.5em; }
        #preview-pane h1 { font-size: 1.9rem; border-bottom: 2px solid var(--border); padding-bottom: 0.3em; }
        #preview-pane p { font-size: 0.9rem; line-height: 1.75; margin: 0.75em 0; color: #2A2A28; }
        #preview-pane code { font-family: var(--mono); font-size: 0.82rem; background: #EEEEE9; padding: 1px 6px; border-radius: 4px; color: #C0392B; }
        #preview-pane pre { background: #1E1E1C; border-radius: 8px; padding: 16px 20px; overflow-x: auto; margin: 1em 0; }
        #preview-pane pre code { background: none; color: #D4D4CC; padding: 0; }
        #preview-pane blockquote { border-left: 3px solid var(--border); padding: 6px 16px; color: var(--muted); background: rgba(0,0,0,0.025); margin: 1em 0; }

        /* EMPTY STATE & MODALS */
        .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--muted); }
        .empty-icon { font-size: 2.5rem; opacity: 0.4; }
        .empty-text { font-size: 0.85rem; text-align: center; line-height: 1.6; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--surface); border-radius: 14px; padding: 28px 32px; width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .modal h3 { font-family: var(--display); font-size: 1.1rem; margin-bottom: 16px; }
        .modal p { font-size: 0.85rem; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
        .modal input { width: 100%; padding: 9px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-family: var(--body); font-size: 0.875rem; outline: none; background: var(--bg); margin-bottom: 20px; color: var(--ink); }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

        .toast { position: fixed; bottom: 24px; right: 24px; background: var(--ink); color: #F0F0EC; font-size: 0.8rem; padding: 10px 18px; border-radius: 20px; transform: translateY(60px); opacity: 0; transition: all 0.25s ease; z-index: 200; pointer-events: none; }
        .toast.show { transform: translateY(0); opacity: 1; }

        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #27AE60; }
        .status-dot.saving { background: #F39C12; }
        .word-count { font-size: 0.72rem; color: var(--muted); padding: 6px 20px; border-top: 1px solid var(--border); background: var(--surface); text-align: right; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-brand">MD <span>to</span> PDF</div>
    <div class="topbar-actions">
        <button class="btn btn-outline btn-sm" id="btn-new-file">＋ File Baru</button>
        <button class="btn btn-solid" id="btn-export">⬇ Ekspor ke PDF</button>
    </div>
</div>

<div class="layout">
    <div class="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">Dokumen</span>
            <button class="btn-add" id="btn-add-sidebar" title="Tambah file baru">+</button>
        </div>
        <div id="file-list"></div>
    </div>

    <div class="main" id="main-area">
        <div class="empty-state" id="empty-state">
            <div class="empty-icon">📄</div>
            <div class="empty-text">Belum ada file yang dipilih.<br>Buat file baru atau pilih dari sidebar.</div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="rename-modal">
    <div class="modal">
        <h3>Ganti Nama File</h3>
        <input type="text" id="rename-input" placeholder="Nama file baru..." />
        <div class="modal-actions">
            <button class="btn btn-outline" id="rename-cancel">Batal</button>
            <button class="btn btn-solid" id="rename-confirm">Simpan</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="delete-modal">
    <div class="modal">
        <h3>Hapus File</h3>
        <p>Yakin ingin menghapus <strong id="delete-file-name">"Untitled"</strong>? Tindakan ini tidak bisa dibatalkan.</p>
        <div class="modal-actions">
            <button class="btn btn-outline" id="delete-cancel">Batal</button>
            <button class="btn btn-danger" id="delete-confirm">Hapus</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    // ─── CONFIG SPRING BOOT API KITA ────────────────────────────────────────
    const BASE_URL = 'http://localhost:8080/api';

    let files = [];
    let activeFileId = null;
    let renameTargetId = null;
    let deleteTargetId = null;
    let saveTimer = null;

    const fileListEl    = document.getElementById('file-list');
    const mainArea      = document.getElementById('main-area');
    const emptyState    = document.getElementById('empty-state');
    const renameModal   = document.getElementById('rename-modal');
    const renameInput   = document.getElementById('rename-input');
    const deleteModal   = document.getElementById('delete-modal');
    const deleteFileName= document.getElementById('delete-file-name');
    const toast         = document.getElementById('toast');

    function showToast(msg, duration = 2200) {
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), duration);
    }

    // ─── FUNGSI HIT API KE BACKEND JAVA KITA ─────────────────────────────────

    // 1. Ambil Semua File
    async function apiGetFiles() {
        const res = await fetch(`${BASE_URL}/doc/all`);
        if (!res.ok) throw new Error('Gagal load');
        return res.json();
    }

    // 2. Buat File Baru (Kirim Teks Biasa)
    async function apiCreateFile(title) {
        const res = await fetch(`${BASE_URL}/doc/create`, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: title
        });
        if (!res.ok) throw new Error('Gagal buat');
        return res.json();
    }

    // 3. Auto Save (Kirim Teks Biasa)
    async function apiSaveContent(id, content) {
        const res = await fetch(`${BASE_URL}/doc/update/${id}`, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: content
        });
        if (!res.ok) throw new Error('Gagal save');
        return res.text();
    }

    // 4. Rename (Kirim Teks Biasa)
    async function apiRenameFile(id, newTitle) {
        const res = await fetch(`${BASE_URL}/doc/rename/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'text/plain' },
            body: newTitle
        });
        if (!res.ok) throw new Error('Gagal rename');
        return res.text();
    }

    // 5. Delete
    async function apiDeleteFile(id) {
        const res = await fetch(`${BASE_URL}/doc/delete/${id}`, { method: 'DELETE' });
        if (!res.ok) throw new Error('Gagal hapus');
        return res.text();
    }

    // ─── RENDER SIDEBAR ───────────────────────────────────────────────────────
    function renderSidebar() {
        fileListEl.innerHTML = '';
        if (files.length === 0) {
            fileListEl.innerHTML = '<div style="font-size:0.78rem;color:var(--muted);text-align:center;padding:12px 0">Belum ada file</div>';
            return;
        }
        files.forEach(f => {
            const item = document.createElement('div');
            item.className = 'file-item' + (f.id === activeFileId ? ' active' : '');
            item.dataset.id = f.id;
            // Perhatikan kita ubah f.name jadi f.title sesuai database kita
            item.innerHTML = `
        <span class="file-icon">📝</span>
        <span class="file-name" title="${escHtml(f.title)}">${escHtml(f.title)}</span>
        <div class="file-actions">
          <button class="icon-btn rename-btn" title="Ganti nama">✏️</button>
          <button class="icon-btn del del-btn" title="Hapus">🗑️</button>
        </div>`;

            item.addEventListener('click', (e) => {
                if (e.target.closest('.file-actions')) return;
                openFile(f.id);
            });
            item.querySelector('.rename-btn').addEventListener('click', (e) => {
                e.stopPropagation(); openRenameModal(f.id);
            });
            item.querySelector('.del-btn').addEventListener('click', (e) => {
                e.stopPropagation(); openDeleteModal(f.id);
            });

            fileListEl.appendChild(item);
        });
    }

    // ─── RENDER EDITOR ────────────────────────────────────────────────────────
    function renderEditor(file) {
        mainArea.innerHTML = `
      <div class="main-info">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text" style="font-size:0.78rem;color:var(--muted)">Tersimpan</span>
        <span style="flex:1"></span>
        <span style="font-size:0.78rem;color:var(--muted);font-family:var(--mono)">${escHtml(file.title)}.md</span>
      </div>
      <div class="editor-area">
        <div class="pane">
          <div class="pane-header"><span>📝</span> Editor Markdown</div>
          <textarea id="markdown-input" spellcheck="false" placeholder="Mulai menulis Markdown di sini...">${escHtml(file.content || '')}</textarea>
        </div>
        <div class="pane">
          <div class="pane-header"><span>👁️</span> Live Preview</div>
          <div id="preview-pane"></div>
        </div>
      </div>
      <div class="word-count" id="word-count">0 kata · 0 karakter</div>`;

        const textarea = document.getElementById('markdown-input');
        updatePreview(textarea.value);
        updateWordCount(textarea.value);

        textarea.addEventListener('input', () => {
            updatePreview(textarea.value);
            updateWordCount(textarea.value);
            scheduleAutoSave(file.id, textarea.value);
        });
    }

    function updatePreview(md) {
        const pane = document.getElementById('preview-pane');
        if (!pane) return;
        pane.innerHTML = marked.parse(md || ''); // Convert Markdown ke HTML di frontend
    }

    function updateWordCount(text) {
        const wc = document.getElementById('word-count');
        if (!wc) return;
        const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
        wc.textContent = `${words} kata · ${text.length} karakter`;
    }

    function scheduleAutoSave(id, content) {
        const dot = document.getElementById('status-dot');
        const txt = document.getElementById('status-text');
        if (dot) dot.className = 'status-dot saving';
        if (txt) txt.textContent = 'Menyimpan...';

        clearTimeout(saveTimer);
        saveTimer = setTimeout(async () => {
            const file = files.find(f => f.id === id);
            if (file) file.content = content;
            try {
                await apiSaveContent(id, content);
                if (dot) dot.className = 'status-dot';
                if (txt) txt.textContent = 'Tersimpan';
            } catch (_) {
                if (dot) dot.className = 'status-dot saving';
                if (txt) txt.textContent = 'Gagal simpan';
            }
        }, 500);
    }

    function openFile(id) {
        activeFileId = id;
        const file = files.find(f => f.id === id);
        renderSidebar();
        if (file) renderEditor(file);
    }

    async function createNewFile() {
        const title = 'Untitled ' + (files.length + 1);
        try {
            const newFile = await apiCreateFile(title);
            files.push(newFile);
            renderSidebar();
            openFile(newFile.id);
            showToast('✅ File baru dibuat');
        } catch (_) {}
    }

    // ─── RENAME & DELETE MODAL ────────────────────────────────────────────────
    function openRenameModal(id) {
        renameTargetId = id;
        const file = files.find(f => f.id === id);
        renameInput.value = file ? file.title : '';
        renameModal.classList.add('show');
        setTimeout(() => { renameInput.focus(); renameInput.select(); }, 50);
    }

    document.getElementById('rename-cancel').addEventListener('click', () => renameModal.classList.remove('show'));
    document.getElementById('rename-confirm').addEventListener('click', doRename);
    renameInput.addEventListener('keydown', e => { if (e.key === 'Enter') doRename(); if (e.key === 'Escape') renameModal.classList.remove('show'); });

    async function doRename() {
        const newTitle = renameInput.value.trim();
        if (!newTitle || !renameTargetId) return;
        try {
            await apiRenameFile(renameTargetId, newTitle);
            const file = files.find(f => f.id === renameTargetId);
            if (file) file.title = newTitle;
            renameModal.classList.remove('show');
            renderSidebar();
            if (activeFileId === renameTargetId) renderEditor(file);
            showToast('✅ File berhasil diganti nama');
        } catch (_) {}
    }

    function openDeleteModal(id) {
        deleteTargetId = id;
        const file = files.find(f => f.id === id);
        deleteFileName.textContent = '"' + (file ? file.title : 'File') + '"';
        deleteModal.classList.add('show');
    }

    document.getElementById('delete-cancel').addEventListener('click', () => deleteModal.classList.remove('show'));
    document.getElementById('delete-confirm').addEventListener('click', async () => {
        if (!deleteTargetId) return;
        try {
            await apiDeleteFile(deleteTargetId);
            files = files.filter(f => f.id !== deleteTargetId);
            if (activeFileId === deleteTargetId) {
                activeFileId = null;
                mainArea.innerHTML = '';
                mainArea.appendChild(emptyState);
                emptyState.style.display = 'flex';
            }
            deleteModal.classList.remove('show');
            renderSidebar();
            showToast('🗑️ File dihapus');
        } catch (_) {}
    });

    // ─── EXPORT PDF MENGGUNAKAN BACKEND JAVA ──────────────────────────────────
    document.getElementById('btn-export').addEventListener('click', async () => {
        const pane = document.getElementById('preview-pane');
        if (!pane || !pane.innerHTML.trim()) { showToast('⚠ Preview kosong, tulis Markdown dulu!', 2500); return; }

        const file = files.find(f => f.id === activeFileId);
        const filename = (file ? file.title : 'dokumen') + '.pdf';

        // Ambil HTML dari kotak preview
        let htmlContent = pane.innerHTML;
        // Bersihkan tag HR dan BR biar mesin Java ngga rewel
        htmlContent = htmlContent.replace(/<br>/g, '<br/>').replace(/<hr>/g, '<hr/>');

        showToast('⏳ Memproses PDF di Server...');

        try {
            // Tembak endpoint Spring Boot lu
            const response = await fetch(`${BASE_URL}/export-pdf-html`, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: htmlContent
            });

            if (!response.ok) throw new Error('Gagal cetak PDF dari server');

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            window.URL.revokeObjectURL(url);

            showToast('✅ PDF berhasil diunduh!');
        } catch (error) {
            showToast('❌ Gagal ekspor: ' + error.message);
        }
    });

    document.getElementById('btn-new-file').addEventListener('click', createNewFile);
    document.getElementById('btn-add-sidebar').addEventListener('click', createNewFile);
    renameModal.addEventListener('click', e => { if (e.target === renameModal) renameModal.classList.remove('show'); });
    deleteModal.addEventListener('click', e => { if (e.target === deleteModal) deleteModal.classList.remove('show'); });

    // ─── INIT ─────────────────────────────────────────────────────────────────
    async function init() {
        try {
            files = await apiGetFiles();
            renderSidebar();
            if (files.length > 0) openFile(files[0].id);
            else {
                mainArea.innerHTML = '';
                mainArea.appendChild(emptyState);
                emptyState.style.display = 'flex';
            }
        } catch (_) {
            renderSidebar();
            mainArea.innerHTML = '';
            mainArea.appendChild(emptyState);
            emptyState.style.display = 'flex';
        }
    }

    function escHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    init();
</script>
</body>
</html>
