<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown to PDF - Live Preview</title>
    <style>
        /* Desain Minimalis Terang */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px; /* Lebarin dikit biar muat 2 kolom */
            margin: 0 auto;
            padding: 40px 20px;
            background-color: #fbfbfb;
            color: #2c3e50;
        }
        h1 { border-bottom: 2px solid #eaeaea; padding-bottom: 10px; color: #1a1a1a; }

        /* Bikin layout kiri-kanan */
        .container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .editor-section, .preview-section {
            flex: 1; /* Masing-masing ambil 50% lebar */
            min-width: 0;
            display: flex;
            flex-direction: column;
        }
        .section-title {
            font-size: 14px;
            font-weight: bold;
            color: #7f8c8d;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        textarea {
            width: 100%;
            height: 500px;
            padding: 18px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 15px;
            background-color: #ffffff;
            color: #333;
            border: 1px solid #dcdcdc;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
            box-sizing: border-box;
            resize: none; /* Matiin resize karena udah flex */
            line-height: 1.5;
            white-space: nowrap;
            overflow-x: auto;
        }
        textarea:focus { outline: none; border-color: #a0a0a0; }

        /* Kotak Preview */
        #previewBox {
            height: 500px;
            padding: 18px;
            background-color: #ffffff;
            border: 1px solid #dcdcdc;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
            overflow-y: auto; /* Biar bisa di-scroll kalau kepanjangan */
            box-sizing: border-box;
            line-height: 1.6;
        }

        /* Styling dikit buat isi Markdown di preview */
        #previewBox h1, #previewBox h2 { margin-top: 0; color: #2c3e50; }
        #previewBox p { color: #444; }

        button {
            margin-top: 20px;
            padding: 12px 28px;
            font-size: 16px;
            cursor: pointer;
            background: #2c3e50;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            width: 200px;
            transition: background 0.3s, transform 0.1s;
        }
        button:hover {
            background: #1a252f;
            transform: translateY(-2px);
        }
        button:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
        }

        /* Gaya untuk Inline Code (Contoh: 'ini coding') */
        #previewBox code {
            background-color: #f6f8fa;
            padding: 0.2em 0.4em;
            border-radius: 6px;
            font-family: "JetBrains Mono", JetBrains;
            font-size: 75%;
            color: #24292f;
        }

        /* Gaya untuk Blok Code (Pakai 3 backtick) */
        #previewBox pre {
            background-color: #f6f8fa;
            padding: 16px;
            border-radius: 6px;
            overflow-x: auto !important; /* Paksa muncul scrollbar */
            white-space: pre !important; /* Paksa manjang ke kanan */
            word-wrap: normal !important; /* Haramkan potong kata */
            word-break: normal !important; /* Haramkan potong kata */
            border: 1px solid #d0d7de;
        }
        #previewBox pre code {
            background-color: transparent;
            padding: 0;
            font-size: 80%;
            color: #24292f;
            white-space: pre !important;
            word-wrap: normal !important;
            word-break: normal !important;
        }

        /* Kotak Preview */
        #previewBox {
            height: 500px;
            padding: 18px;
            background-color: #ffffff;
            border: 1px solid #dcdcdc;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
            overflow-y: auto;
            overflow-x: hidden; /* 🔥 Tambahin ini */
            box-sizing: border-box;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<h1>[ MD -> PDF ]</h1>
<p>Ketik format Markdown di kolom kiri, lihat hasil di kanan, lalu cetak PDF-nya.</p>

<div class="container">
    <div class="editor-section">
        <div class="section-title">Editor Markdown</div>
        <textarea id="markdownInput"># Halo Bro!
Ini adalah fitur **Live Preview** yang keren banget.

* Coba ketik sesuatu di sini...
* Kolom sebelah kanan bakal otomatis *update*!
            </textarea>
    </div>

    <div class="preview-section">
        <div class="section-title">Live Preview</div>
        <div id="previewBox">Loading preview...</div>
    </div>
</div>

<button id="exportBtn" onclick="exportPdf()">Cetak PDF</button>

<script>
    // 1. Fitur Live Preview dengan Debounce
    let typingTimer;
    const doneTypingInterval = 500; // jeda 0.5 detik
    const markdownInput = document.getElementById('markdownInput');
    const previewBox = document.getElementById('previewBox');

    // Panggil saat pertama kali web dibuka
    updatePreview();

    // Listener saat kita ngetik
    markdownInput.addEventListener('input', () => {
        clearTimeout(typingTimer); // Reset timer tiap kali ngetik
        typingTimer = setTimeout(updatePreview, doneTypingInterval); // Mulai timer baru
    });

    async function updatePreview() {
        const text = markdownInput.value;
        try {
            const response = await fetch('/api/test-html', {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: text
            });

            if (response.ok) {
                const html = await response.text();
                previewBox.innerHTML = html; // Masukin HTML dari server ke dalam kotak kanan
            }
        } catch (error) {
            console.error("Gagal load preview: ", error);
        }
    }

    // 2. Fitur Export PDF (Tetap sama seperti sebelumnya)
    async function exportPdf() {
        const markdownText = markdownInput.value;
        const btn = document.getElementById('exportBtn');

        btn.innerText = 'MENCETAK...';
        btn.disabled = true;

        try {
            const response = await fetch('/api/export-pdf', {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: markdownText
            });

            if (!response.ok) throw new Error('Gagal nge-hit API bro!');

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'dokumen-rapi.pdf';
            document.body.appendChild(a);
            a.click();
            a.remove();
            window.URL.revokeObjectURL(url);

        } catch (error) {
            alert('Waduh error: ' + error.message);
        } finally {
            btn.innerText = 'Cetak PDF';
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
